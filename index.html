<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Wallet Checker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-top">
                <h1>🔍 Crypto Wallet Checker</h1>
                <button id="themeToggle" class="theme-toggle" title="Toggle dark mode">🌙</button>
            </div>
            <p class="subtitle">Check wallet balance and recent transactions across multiple networks</p>
        </header>

        <div class="input-section">
            <div class="network-selector">
                <label for="networkSelect">Network:</label>
                <select id="networkSelect" class="network-select">
                    <option value="ethereum">Ethereum</option>
                    <option value="polygon">Polygon (Matic)</option>
                    <option value="bsc">Binance Smart Chain</option>
                </select>
            </div>

            <div class="input-group">
                <input 
                    type="text" 
                    id="walletAddress" 
                    placeholder="Paste wallet address (0x...)" 
                    class="wallet-input"
                >
                <button id="checkBtn" class="check-button">Check Wallet</button>
            </div>
            <div id="error" class="error-message"></div>
        </div>

        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>Loading wallet data...</p>
        </div>

        <div id="results" class="results hidden">
            <div class="balance-section">
                <h2>💰 Wallet Balance</h2>
                <div class="balance-card">
                    <div class="balance-item">
                        <span class="label">Address:</span>
                        <span id="displayAddress" class="value"></span>
                    </div>
                    <div class="balance-item">
                        <span class="label">Balance:</span>
                        <span id="cryptoBalance" class="value large"></span>
                    </div>
                    <div class="balance-item">
                        <span class="label">USD Value:</span>
                        <span id="usdValue" class="value large"></span>
                    </div>
                    <div class="balance-item">
                        <span class="label">Total Transactions:</span>
                        <span id="txCount" class="value"></span>
                    </div>
                </div>
            </div>

            <div class="transactions-section">
                <div class="transactions-header">
                    <h2>📝 Recent Transactions</h2>
                    <button id="exportBtn" class="export-button">📥 Export to CSV</button>
                </div>

                <div class="filter-section">
                    <div class="date-filter">
                        <label for="startDate">From:</label>
                        <input type="date" id="startDate" class="date-input">
                    </div>
                    <div class="date-filter">
                        <label for="endDate">To:</label>
                        <input type="date" id="endDate" class="date-input">
                    </div>
                    <button id="filterBtn" class="filter-button">Filter</button>
                    <button id="resetBtn" class="reset-button">Reset</button>
                </div>

                <div id="filteredCount" class="filtered-count"></div>
                <div id="transactionsList" class="transactions-list"></div>
            </div>
        </div>

        <div id="emptyState" class="empty-state">
            <p>👆 Enter a wallet address to get started</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
